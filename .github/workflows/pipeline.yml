name: Air Quality Pipeline

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:        # ejecución manual desde GitHub

jobs:
  ingest:
    name: Ingesta y transformación
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Instalar dependencias
        run: pip install -r ingestion/requirements.txt

      - name: Autenticar en GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Ejecutar ingesta
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: raw
          BQ_TABLE: mediciones_madrid
        run: python ingestion/fetch_aire.py

      - name: Instalar dbt
        run: pip install dbt-bigquery

      - name: Crear profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          aire_espana:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: ${{ secrets.BQ_PROJECT }}
                dataset: dbt_staging
                location: EU
                threads: 4
                timeout_seconds: 300
                keyfile: /tmp/gcp_key.json
          EOF
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp_key.json

      - name: Ejecutar dbt
        working-directory: dbt_project
        run: |
          dbt deps
          dbt run --target prod
          dbt test --target prod

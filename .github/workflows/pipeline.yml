name: Pipeline calidad del aire

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto
  workflow_dispatch:        # lanzamiento manual desde GitHub

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Instalar dependencias
        run: |
          pip install -r ingestion/requirements.txt
          pip install dbt-bigquery==1.11.1

      - name: Configurar credenciales GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json" >> $GITHUB_ENV

      - name: Crear profiles.yml para dbt
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          aire_espana:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ${{ secrets.BQ_PROJECT }}
                dataset: dbt_staging
                keyfile: /tmp/gcp_key.json
                location: EU
                threads: 4
                timeout_seconds: 300
          EOF

      - name: Ingesta de datos
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
        run: python ingestion/fetch_aire.py

      - name: dbt run
        working-directory: dbt_project
        run: dbt run

      - name: dbt test
        working-directory: dbt_project
        run: dbt test
